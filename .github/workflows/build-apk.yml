name: Build Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools & platform
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" --sdk_root=$ANDROID_SDK_ROOT

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Build release APK
        working-directory: android
        env:
          KEYSTORE_PATH:     release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
          ANDROID_SDK_ROOT:  ${{ env.ANDROID_SDK_ROOT }}
        run: |
          gradle assembleRelease \
            --no-daemon \
            -Pandroid.sdk.dir=$ANDROID_SDK_ROOT

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk \
             tution-media-v1.0.0-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tution-media-release-apk
          path: tution-media-v1.0.0-release.apk
          retention-days: 30
