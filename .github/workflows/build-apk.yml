name: Build Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Install SDK components
        run: |
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses > /dev/null 2>&1 || true
          "$SDKMANAGER" "platforms;android-33" "build-tools;33.0.2"

      - name: Write local.properties
        working-directory: android
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK (unsigned)
        working-directory: android
        run: |
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee build.log
          exit ${PIPESTATUS[0]}

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: android/build.log
          retention-days: 7

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore

      - name: Sign APK with apksigner
        run: |
          APKSIGNER="$ANDROID_SDK_ROOT/build-tools/33.0.2/apksigner"
          UNSIGNED="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          SIGNED="tution-media-v1.0.0-release.apk"
          $APKSIGNER sign \
            --ks release.keystore \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --ks-pass "pass:${{ secrets.KEYSTORE_PASSWORD }}" \
            --key-pass "pass:${{ secrets.KEY_PASSWORD }}" \
            --out "$SIGNED" \
            "$UNSIGNED"
          $APKSIGNER verify "$SIGNED" && echo "APK verified"

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: tution-media-release-apk
          path: tution-media-v1.0.0-release.apk
          retention-days: 30
