<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Tution Media · Tutor marketplace</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0F0F0F" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Tution" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="/icon-180.png" />
  <link rel="icon" type="image/png" href="/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=DM+Mono:wght@400;500&display=swap" />
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #0F0F0F; }
    body { font-family: 'DM Sans', 'Helvetica Neue', sans-serif; -webkit-font-smoothing: antialiased; }
    #root { height: 100dvh; }

    /* Splash — visible until React mounts, then replaced. */
    #tm-splash {
      position: fixed; inset: 0; background: #0F0F0F; z-index: 9999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 18px; font-family: 'DM Sans', sans-serif;
    }
    #tm-splash .tile {
      width: 64px; height: 64px; border-radius: 16px; background: #FFC83D; color: #0F0F0F;
      display: flex; align-items: center; justify-content: center;
      font-family: Georgia, serif; font-size: 42px; line-height: 1;
      animation: tm-pop .5s cubic-bezier(.2,.8,.2,1);
    }
    #tm-splash .wm { color: #f0eee9; font-size: 18px; letter-spacing: -.01em; }
    #tm-splash .wm b { color: #FFC83D; }
    #tm-splash .dots { display: flex; gap: 6px; margin-top: 2px; }
    #tm-splash .dots i { width: 6px; height: 6px; border-radius: 3px; background: rgba(255,255,255,.3);
      animation: tm-blink 1.1s infinite; }
    #tm-splash .dots i:nth-child(2) { animation-delay: .18s; }
    #tm-splash .dots i:nth-child(3) { animation-delay: .36s; }
    @keyframes tm-pop { from { transform: scale(.6); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes tm-blink { 0%,100% { opacity: .25; } 50% { opacity: 1; } }
  </style>
</head>
<body>
  <div id="root">
    <div id="tm-splash">
      <div class="tile">t</div>
      <div class="wm">Tution<b>.</b>media</div>
      <div class="dots"><i></i><i></i><i></i></div>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
