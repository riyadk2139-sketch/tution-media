<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Tution Media · Tutor app</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FFC83D">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; }
  /* Pre-load fonts to reduce FOUT inside artboards */
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=DM+Mono:wght@400;500&display=swap');
  body { font-family: 'DM Sans', 'Helvetica Neue', sans-serif; }
  #root { height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<script src="vendor/react.development.js"></script>
<script src="vendor/react-dom.development.js"></script>
<script src="vendor/babel.min.js"></script>

<!-- design tokens & primitives -->
<script type="text/babel" src="src/tokens.jsx"></script>
<script type="text/babel" src="src/ui.jsx"></script>
<script type="text/babel" src="src/data.jsx"></script>

<!-- persistent store (must load before screens that may use it) -->
<script type="text/babel" src="src/store.jsx"></script>

<!-- starter components -->
<script type="text/babel" src="src/android-frame.jsx"></script>
<script type="text/babel" src="src/design-canvas.jsx"></script>
<script type="text/babel" src="src/tweaks-panel.jsx"></script>

<!-- screens — tutor side -->
<script type="text/babel" src="src/screens-a.jsx"></script>
<script type="text/babel" src="src/screens-b.jsx"></script>
<script type="text/babel" src="src/screens-c.jsx"></script>

<!-- screens — guardian side -->
<script type="text/babel" src="src/screens-guardian.jsx"></script>

<!-- additional screens for full app -->
<script type="text/babel" src="src/screens-extra.jsx"></script>

<!-- mobile app shell -->
<script type="text/babel" src="src/mobile-app.jsx"></script>

<!-- app -->
<script type="text/babel" src="src/app.jsx"></script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
</script>
</body>
</html>
