<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Tution Media · Tutor app</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0F0F0F">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Tution">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; }
  /* Pre-load fonts to reduce FOUT inside artboards */
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=DM+Mono:wght@400;500&display=swap');
  body { font-family: 'DM Sans', 'Helvetica Neue', sans-serif; }
  #root { height: 100vh; }

  /* Splash — shown until React mounts, then replaced. */
  #tm-splash {
    position: fixed; inset: 0; background: #0F0F0F; z-index: 9999;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 18px; transition: opacity .35s ease; font-family: 'DM Sans', sans-serif;
  }
  #tm-splash .tile {
    width: 64px; height: 64px; border-radius: 16px; background: #FFC83D; color: #0F0F0F;
    display: flex; align-items: center; justify-content: center;
    font-family: Georgia, serif; font-size: 42px; line-height: 1;
    animation: tm-pop .6s cubic-bezier(.2,.8,.2,1);
  }
  #tm-splash .wm { color: #f0eee9; font-size: 18px; letter-spacing: -.01em; }
  #tm-splash .wm b { color: #FFC83D; }
  #tm-splash .dots { display: flex; gap: 6px; margin-top: 4px; }
  #tm-splash .dots i { width: 6px; height: 6px; border-radius: 3px; background: rgba(255,255,255,.3);
    animation: tm-blink 1.1s infinite; }
  #tm-splash .dots i:nth-child(2) { animation-delay: .18s; }
  #tm-splash .dots i:nth-child(3) { animation-delay: .36s; }
  @keyframes tm-pop { from { transform: scale(.6); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  @keyframes tm-blink { 0%,100% { opacity: .25; } 50% { opacity: 1; } }
</style>
</head>
<body>
<div id="root">
  <div id="tm-splash">
    <div class="tile">t</div>
    <div class="wm">Tution<b>.</b>media</div>
    <div class="dots"><i></i><i></i><i></i></div>
  </div>
</div>

<script src="vendor/react.development.js"></script>
<script src="vendor/react-dom.development.js"></script>
<script src="vendor/babel.min.js"></script>

<!-- design tokens & primitives -->
<script type="text/babel" src="src/tokens.jsx"></script>
<script type="text/babel" src="src/ui.jsx"></script>
<script type="text/babel" src="src/data.jsx"></script>

<!-- persistent store (must load before screens that may use it) -->

<!-- starter components -->
<script type="text/babel" src="src/android-frame.jsx"></script>
<script type="text/babel" src="src/design-canvas.jsx"></script>
<script type="text/babel" src="src/tweaks-panel.jsx"></script>

<!-- screens — tutor side -->
<script type="text/babel" src="src/screens-a.jsx"></script>
<script type="text/babel" src="src/screens-b.jsx"></script>
<script type="text/babel" src="src/screens-c.jsx"></script>

<!-- screens — guardian side -->
<script type="text/babel" src="src/screens-guardian.jsx"></script>

<!-- additional screens for full app -->
<script type="text/babel" src="src/screens-extra.jsx"></script>

<!-- mobile app shell -->
<script type="text/babel" src="src/mobile-app.jsx"></script>

<!-- app -->
<script type="text/babel" src="src/app.jsx"></script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
</script>
</body>
</html>
